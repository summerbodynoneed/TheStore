<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panier - Boutique en ligne</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">
  <header class="header-container">
    <img src="..." alt="Logo">
    <h1>Boutique en ligne</h1>
    <a class="cart-link" href="cart.html" title="Voir le panier">
      🛒
      <span id="cart-badge" style="display:none;">0</span>
    </a>
  </header>

  <nav class="center-text">
    <a href="index.html">Accueil</a> | 
    <a href="products.html">Produits</a> | 
    <a href="#contact">Contact</a>
  </nav>

  <h1>🛒 Mon Panier</h1>

  <div id="cart-items"></div>

  <h2 id="total"></h2>

  <div style="margin-top: 20px;">
    <button onclick="checkout()" style="background: linear-gradient(135deg, #00aa00 0%, #00dd00 100%); color: white; padding: 12px 20px; cursor: pointer; margin-right: 10px;">💳 Commander</button>
    <button onclick="clearCart()" style="background: linear-gradient(135deg, #aa0000 0%, #dd0000 100%); color: white; padding: 12px 20px; cursor: pointer;">🗑️ Vider le panier</button>
  </div>

  <p style="margin-top: 30px;"><a href="products.html">← Continuer les achats</a></p>
</div>

<script src="product.js"></script>
<script src="cart.js"></script>

</body>
</html>
