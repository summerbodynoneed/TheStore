<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Boutique en ligne - Années 2000</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <header class="header-container">
    <img src="..." alt="Logo">
    <h1>Boutique en ligne</h1>
    <a class="cart-link" href="cart.html" title="Voir le panier">
      🛒
      <span id="cart-badge" style="display:none;">0</span>
    </a>
  </header>

  <nav class="center-text">
    <a href="index.html">Accueil</a> | 
    <a href="products.html">Produits</a> | 
    <a href="#contact">Contact</a>
  </nav>

  <h2>Nos produits</h2>

  <div class="carousel-container">
    <button class="carousel-btn carousel-prev" onclick="prevSlide()">❮</button>
    
    <div class="carousel">
      <div class="carousel-inner" id="carousel-inner">
        <!-- Les produits vont s'afficher ici dynamiquement -->
      </div>
    </div>

    <button class="carousel-btn carousel-next" onclick="nextSlide()">❯</button>
  </div>

  <div class="carousel-dots" id="carousel-dots">
    <!-- Les points de pagination vont s'afficher ici -->
  </div>
</div>

<script src="product.js"></script>
<script src="carousel.js"></script>

</body>
</html>
